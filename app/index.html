<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: rgba(0,0,0,0.2);
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      background: #ff7a18;
      border: none;
      border-radius: 25px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff512f;
      transform: scale(1.05);
    }

    .card {
      background: white;
      color: #333;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    footer {
      margin-top: 50px;
      padding: 15px;
      font-size: 14px;
      background: rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<header>
  🚀 DevOps CI/CD Demo
</header>

<div class="container">
  <h1>Hello, Akshay 👋</h1>
  <p>Your Docker deployment is working successfully!</p>

  <button class="btn">Explore More</button>

  <div class="card">
    <h3>🔥 Features</h3>
    <p>CI/CD Pipeline</p>
    <p>Docker Deployment</p>
    <p>AWS EC2 Hosting</p>
  </div>
</div>

<footer>
  © 2026 DevOps Project | Built with ❤️
</footer>

</body>
</html>
